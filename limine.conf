# WuBuOS Limine Boot Configuration
# Place in /boot/limine.conf or EFI/BOOT/limine.conf

timeout: 5

entry "WuBuOS (ZealOS Kernel + Win98 Shell)"
    protocol: limine
    kernel_path: /boot/kernel.elf
    cmdline: 
        log_level=debug
        vga=1920x1080
        theme=98
    module_path: /boot/initrd.tar
    # UEFI only
    # efi_path: /EFI/BOOT/BOOTX64.EFI
    # devicetree_path: /boot/dtb
    
entry "WuBuOS (Recovery Mode - Minimal)"
    protocol: limine
    kernel_path: /boot/kernel.elf
    cmdline:
        single
        vga=1024x768
        theme=98

entry "WuBuOS (Debug - Serial Console)"
    protocol: limine
    kernel_path: /boot/kernel.elf
    cmdline:
        log_level=trace
        console=serial0
        vga=1024x768

entry "WuBuOS (WSL2 Compatibility Test)"
    protocol: limine
    kernel_path: /boot/kernel.elf
    cmdline:
        env=wsl2
        vga=1920x1080
        theme=98